version: 2
updates:
  # 前端应用的 npm 依赖
  - package-ecosystem: npm
    directory: /FRONTEND/japan-disaster-relief
    schedule:
      interval: monthly
      timezone: Asia/Tokyo
    # 把小版本/补丁升级合并成一个 PR，减少 PR 噪音；
    # 大版本升级（可能有破坏性变更）单独开 PR
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5

  # CI 里用到的 GitHub Actions（actions/checkout 等也可能有漏洞）
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      timezone: Asia/Tokyo
