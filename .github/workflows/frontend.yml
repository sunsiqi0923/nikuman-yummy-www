name: Frontend CI/CD

on:
  pull_request:
    paths:
      - "FRONTEND/japan-disaster-relief/**"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - develop
    paths:
      - "FRONTEND/japan-disaster-relief/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: FRONTEND/japan-disaster-relief

jobs:
  build:
    name: Build (Next.js + OpenNext)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FRONTEND/japan-disaster-relief/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # next build (含 TypeScript 类型检查) + OpenNext 转换，
      # 产物与真实部署完全一致，能在 PR 阶段发现部署适配问题
      - name: Build worker bundle
        run: npx opennextjs-cloudflare build

  deploy:
    name: Deploy to Cloudflare Workers
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: cloudflare-production
    concurrency:
      group: frontend-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FRONTEND/japan-disaster-relief/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
